name: BudgetBuddy Android CI

# Runs on every push and pull request to main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (Android requires Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Gradle so builds are faster on repeat runs
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build the app (checks for compile errors)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. Run unit tests (fast, no emulator needed)
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      # 7. Upload test results so you can see them on GitHub
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

      # 8. Upload the built APK so you can download it from GitHub
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BudgetBuddy-debug
          path: app/build/outputs/apk/debug/app-debug.apk
